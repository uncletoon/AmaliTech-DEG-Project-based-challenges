services:
  redis:
    image: redis:latest
    container_name: redis-celery
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - pulse_check_network

  web:
    build: .
    container_name: pulse-check-web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pulse_check_network

  celery:
    build: .
    container_name: pulse-check-celery
    command: celery -A pulse_check_project worker -l info
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pulse_check_network

volumes:
  redis_data:

networks:
  pulse_check_network:
    driver: bridge
